name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      TEST_MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
      SECRET: ${{ secrets.SECRET }}
    steps:
      - uses: actions/checkout/@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install client dependencies
        run: npm install --prefix client
      - name: Install server dependencies
        run: npm install --prefix server
      - name: Check client style
        run: npm run lint --prefix client
      - name: Check server style
        run: npm run lint --prefix server
      - name: Test client
        run: npm run test --prefix client
      - name: Test server
        run: npm run test --prefix server
      - name: Build client
        run: npm run build --prefix client
      - name: Fail if not on main branch
        run: exit 1
      - name: Copy Client Build to Server
        run: |
          rm -rf server/dist
          cp -r client/dist server/
  deploy:
    if: ${{ github.event_name == 'push' }}
    needs: [build_and_test]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ','), '#skip') }}
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}
  notify_success:
    if: ${{ github.event_name == 'push' }}
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Success Notification
        if: ${{ success() }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: false
          status: ${{ job.status }}
          content: ✅ **Deployment Successful** A new version has been deployed to production'
          title: Deployment Details
          description: |
            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message}}
            **Author:** ${{ github.event.head_commit.author.name }}
  notify_build_failure:
    if: ${{ always() && (needs.build_and_test.result == 'failure' || needs.deploy.result == 'failure') }}
    needs: [build_and_test, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Failed Build notification
        uses: sarisia/actions-status-discord@v1
        if: ${{ failure() }}
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          status: ${{ job.status }}
          content: '❌ **Build Failed!** The pipeline encountered an error'
          title: Failure Details
          description: |
            **Repository:** ${{ github.action_repository}}
            **Branch:** ${{ github.ref_name}}
            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.event.head_commit.author.name }}
            **Workflow:** ${{ github.workflow }}
            **Job:** ${{ github.job }}

            [View Commit](${{ github.event.head_commit.url}})
            [View Workflow Run](${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }})
